<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signature Studio</title>

    <link rel="icon" href="favicon-16x16.png">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap (Buttons Only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background-blur blur1"></div>
    <div class="background-blur blur2"></div>

    <main class="container-box">

        <!-- Header -->

        <header class="hero">

            <h1>✍️ Signature Studio</h1>

            <p>
                Create, save and download professional digital signatures instantly.
            </p>

        </header>

        <!-- Toolbar -->

        <section class="toolbar">

            <div class="tool-card">

                <label for="colorPicker">
                    Brush Color
                </label>

                <input
                    type="color"
                    id="colorPicker"
                    value="#ffffff"
                >

            </div>

            <div class="tool-card">

                <label for="canvasColor">
                    Canvas Color
                </label>

                <input
                    type="color"
                    id="canvasColor"
                    value="#ffffff"
                >

            </div>

            <div class="tool-card">

                <label for="brushSize">
                    Brush Size
                </label>

                <input
                    type="range"
                    id="brushSize"
                    min="2"
                    max="20"
                    value="4"
                >

                <span id="brushValue">
                    4 px
                </span>

            </div>

        </section>

        <!-- Canvas -->

        <section class="canvas-card">

            <div class="canvas-wrapper">
                <canvas id="myCanvas" width="1000" height="500"></canvas>
                <div id="brushCursor"></div>
            </div>

        </section>

        <!-- Buttons -->

        <section class="actions">

            <button
                class="btn btn-outline-light"
                id="undoButton"
            >
                ↩ Undo
            </button>

            <button
                class="btn btn-danger"
                id="clearButton"
            >
                🗑 Clear
            </button>

            <button
                class="btn btn-primary"
                id="retreive"
            >
                📂 Retrieve
            </button>

            <button
                class="btn btn-success"
                id="saveButton"
            >
                ⬇ Download
            </button>

        </section>

        <!-- Footer -->

        <footer>

            <p>
                Your signature is automatically saved in your browser.
            </p>

        </footer>

    </main>

    <script src="script.js"></script>

</body>

</html>
